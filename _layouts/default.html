<!doctype html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- <link rel="shortcut icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}"> -->
    {% seo %}

    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ '/assets/css/main.css?v=' | append: site.github.build_revision | relative_url }}"><!-- CSS -->

    <!-- Scripts -->
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    
    <!-- MathJax -->
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          tags: 'ams'
        },
        chtml: {
          mtextInheritFont: true,
        }
        output: {
          font: 'mathjax-stix2' // Example: switching to STIX2
        }
      };
    </script>
    <script id="MathJax-script" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js">
    </script>

    <!-- Mobile Hamburger Toggle -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const navToggle = document.getElementById('nav-toggle');
        const navList = document.querySelector('.nav-list');

        navToggle.addEventListener('click', () => {
          navList.classList.toggle('show');
        });

        document.querySelectorAll('.parent-toggle').forEach(toggle => {
          toggle.addEventListener('click', (e) => {
            e.preventDefault();
            toggle.parentElement.classList.toggle('show');
          });
        });
      });
    </script>
  </head>

  <body>
    <!-- Navigation -->
    <nav id="Menu">
      <button id="nav-toggle" aria-label="Toggle menu">☰</button>
      <ul class="nav-list">
        <!--<li><a href="{{ '/' | relative_url}}">Home</a></li>-->
        <li><a href="{{ '/' | relative_url }}">Home</a></li>

        <li class="dropdown">
          <a href="#" class="parent-toggle">Content</a>
          <ul class="dropdown-content">
            <!--<li><a href="{{ site.url }}/upcoming">Upcoming</a></li>-->
            <li><a href="{{ '/upcoming' | relative_url }}">Notes</a></li>
            <li><a href="{{'/past' | relative_url }}">Discussions</a></li>
          </ul>
        <!--</li>-->

        <li><a href="{{ '/suggestions' | relative_url }}">About</a></li>
      </ul>
    </nav>

    <!-- Main Content -->
    <div class="wrapper">
      <section>
        <div  id="title">
          <h1 style="font-weight: 500">{{ site.title | default: site.github.repository_name }}</h1>
          <p>{{ site.description | default: site.github.project_tagline }}</p>
          <hr>
          <span class="credits left">Hosted on GitHub Pages</span>
          <span class="credits right">Theme based on "Midnight", by <a href="https://twitter.com/mattgraham">mattgraham</a></span>
        </div>
        
        {{ content }}

      </section>
    </div>
  </body>
</html>
